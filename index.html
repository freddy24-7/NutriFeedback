<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#339e68" />
    <title>NutriApp — Flexible Nutrition Tracking</title>
    <meta
      name="description"
      content="Log what you eat, get AI-powered tips, scan barcodes, and track your nutrition over time — as accurately or loosely as you like."
    />
    <!-- Prevent flash of wrong theme by reading stored preference before React renders -->
    <script>
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem('ui-preferences') || '{}');
          if (stored && stored.state && stored.state.theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
